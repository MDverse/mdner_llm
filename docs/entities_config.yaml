# ============================================================
# Entity filtering configuration
# ============================================================
#
# Each top-level key corresponds to an entity label
# (e.g., MOL, SOFTNAME, SOFTVERS, etc.).
#
# For each entity, you can define:
#   - black_list: list of unwanted terms to remove
#
# Rules:
#   - Matching is exact (no partial matching)
#   - Matching is case-insensitive (handled in code)
#   - All terms should be written in lowercase here
#
# Best practices:
#   - Only include non-informative or noisy terms
#   - Avoid ambiguous terms unless necessary
#   - Keep lists specific to each entity type
#
# If an entity does not require filtering:
#   → omit it entirely instead of using an empty list
#
# This file is designed to be easily extendable without
# modifying the Python code.
# ============================================================

MOL:
  # Non-informative or overly generic molecular terms
  black_list:
    - water
    - waters
    - lipid
    - lipids
    - protein
    - proteins
    - salt
    - membrane
    - dna
    - rna
    - ion
    - ions
    - ligand
    - ligands


SOFTNAME:
  black_list:
    - unknown
    - software
    - tool

FFM:
  black_list:
    - ffm
    - forcefield

SOFTVERS:
  # Example (uncomment if needed):
  # black_list:
  #   - version

STIME:
  # Example:
  # black_list:
  #   - unknown

TEMP:
  # Example:
  # black_list:
  #   - temperature
  #   - ambient
