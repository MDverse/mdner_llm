model:
  name: "fastino/gliner2-large-v1"
  experiment_name: "gliner2-large-v1-finetuned-lora-test-30epochs"
  output_dir: "results/gliner/models"

data:
  annotations_path: "data/annotations/groundtruth"
  train_ratio: 0.8
  val_ratio: 0.2
  seed: 42

entities:
  MOL: "Molecule or chemical compound involved in the simulation."
  SOFTNAME: "Molecular dynamics software used for the simulation."
  SOFTVERS: "Version of the molecular dynamics software."
  STEMP: "Simulation temperature, typically expressed in Kelvin or Celsius."
  FFM: "Force field or model used to describe interatomic interactions."
  STIME: "Total simulation time or duration."

training:
  # Training schedule
  num_epochs: 30
  batch_size: 2
  max_steps: -1
  gradient_accumulation_steps: 4
  cv_folds: 5

  # Learning rates
  encoder_lr: 1e-5 # Learning rate for encoder
  task_lr: 5e-5 # Learning rate for task-specific heads
  warmup_ratio: 0.15
  scheduler_type: "cosine"

  # Optimization
  weight_decay: 0.05

  # Precision / hardware
  fp16: True
  bf16: False

  # LoRA settings
  use_lora: True # Enable LoRA
  lora_r: 8 # Rank (4, 8, 16, 32)
  lora_alpha: 16.0 # Scaling factor (usually 2*r)
  lora_dropout: 0.2 # Dropout for LoRA layers
  lora_target_modules: ["encoder"] # Apply to all encoder layers (query, key, value, dense)
  save_adapter_only: True # Save only adapter (not full model)

  # Checkpointing
  eval_strategy: "epoch"
  metric_for_best: "eval_loss"
  save_best: True

  # Logging
  logging_steps: 10
  logging_first_step: True
